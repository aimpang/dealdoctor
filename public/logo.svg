<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="DealDoctor">
  <!-- The vital mark: a single pulse-stroke that spikes into a pitched roof -->
  <g transform="translate(0,24)">
    <path d="M0 22 L18 22 M46 22 L64 22" stroke="#18181b" stroke-opacity="0.35" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M18 22 L22 26 L32 6 L42 26 L46 22" stroke="#18181b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="32" cy="6" r="2.2" fill="#f97316"/>
  </g>
  <!-- Wordmark -->
  <text x="88" y="52" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan fill="#18181b">Deal</tspan><tspan fill="#f97316">Doctor</tspan>
  </text>
</svg>
